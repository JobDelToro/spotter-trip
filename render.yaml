services:
  - type: web
    name: spotter-trip-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: spotter-trip-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://spotter-trip.vercel.app
      - key: PYTHON_VERSION
        value: "3.13.7"
